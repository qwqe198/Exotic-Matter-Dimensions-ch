	"alemaninc": { class: "Ω", color: "#0000ff", title: "首席开发者" },
	"Celestial of Blob / hyperbolia": { class: "S+", color: "#fac112", title: "绝对天体" },
	"nicodium": { class: "S", color: "#4285f4", title: "双重天体" },
	"Stat Mark": { class: "S", color: "#00ffff", title: "熵之天体" },
	"xhwzwka": { class: "S", color: "#ff0000", title: "谜之天体" }
}

function contributorColor(name) {
	return (specialGrade[name] === undefined) ? "inherit" : specialGrade[name].color
}

/*
等级描述：
Ω		alemaninc
S		像 alemaninc 但不是 alemaninc
A		巨大影响
B		对大多数玩家有用 / 有影响力
C		较小的补充
D		彩蛋 / 极其微小
E		完全无意义
*/

const classes = ["E","E+","D/E","D-","D","D+","C/D","C-","C","C+","B/C","B-","B","B+","A/B","A-","A","A+","S/A","S-","S","S+","Ω"]

function classToScore(x) {
	if (x === "Ω") { return Infinity }
	let pos = classes.indexOf(x)
	return Math.exp(pos / Math.E)
}

function overallClass(arr) {
	if (arr.length === 0) { return "F" }
	let total = arr.map(x => classToScore(x)).reduce((a, b) => a + b)
	for (let i = classes.length - 1; i >= 0; i--) {
		if (total >= classToScore(classes[i])) { return classes[i] }
	}
}

function popup(data) {
	d.display("div_fancyPopupScreen", "inline-block")
	d.innerHTML("span_fancyPopupText", data.text)
	if (data.input !== undefined)
		d.element("span_fancyPopupText").innerHTML += "<br><textarea id=\"span_fancyPopupInput\" style=\"width:90%;height:40%\">" + data.input + "</textarea>"
	d.innerHTML("span_fancyPopupButtons", "")
	for (let i of (data.buttons ?? [["Close", ""]]))
		d.element("span_fancyPopupButtons").innerHTML += "<button onClick=\"d.display('div_fancyPopupScreen','none');" + i[1] + "\" class=\"genericbutton size3\">" + i[0] + "</button>"
}

function personClass(name) {
	return (specialGrade[name] === undefined)
		? overallClass(Object.values(contributions[name]).map(x => x.map(y => y.class)).flat())
		: specialGrade[name].class
}

function showContributions(name) {
	let out = "", counter = 1
	for (let i of Object.keys(categories)) {
		if (contributions[name][i] !== undefined) {
			out += "<h4 style=\"color:" + i.color + ";\">" + i + "</h4><table>"
			for (let j of contributions[name][i]) {
				out += "<tr><td style=\"width:25px;padding-right:10px;text-align:right;color:" + i.color + ";\">" + counter + "</td><td style=\"width:calc(60vw - 36px);text-align:left;color:" + i.color + ";\">" +
					((j.EMDLevel > EMDLevel) ? ("<i>达到 EMD 等级 " + j.EMDLevel + " 以揭示此内容</i>") : j.text) +
					"<span style=\"float:right;\">[等级 " + j.class.replace("+", "<sup>+</sup>").replace("-", "<sup>-</sup>") + "]</span></td></tr>"
				counter++
			}
			out += "</table>"
		}
	}
	popup({
		text: "<h3 style=\"color:" + (contributorColor(name) ?? "inherit") + ";\">" + name + " 的贡献 <span style=\"float:right;\">[总体等级 " + personClass(name).replace("+", "<sup>+</sup>").replace("-", "<sup>-</sup>") + "]</span></h3><hr>" + out,
		buttons: [["Close", ""]]
	})
}

function contributorSort(a, b) {
	return ((Object.keys(specialGrade).includes(b) ? 1 : 0) - (Object.keys(specialGrade).includes(a) ? 1 : 0)) || (a.toLowerCase() > b.toLowerCase())
}

function switchTab(name) {
	let names = (name === "All")
		? Object.keys(contributions).sort(contributorSort)
		: (name === "Special")
			? Object.keys(specialGrade)
			: Object.keys(contributions)
				.map(x => [x, (contributions[x][name] === undefined) ? "F" : overallClass(contributions[x][name].map(x => x.class))])
				.filter(x => x[1] !== "F")
				.map(x => x[0])
				.sort(contributorSort)

	d.innerHTML("credits", ((name === "All") ? "致所有帮助让 <i>奇异物质维度</i> 成为更好游戏的人。" : categories[name]) +
		"<br><br>" +
		names.map(x => "<div style=\"height:30px;width:300px;display:inline-block;color:" + contributorColor(x) + ";\" onClick=\"showContributions('" + x + "')\">" + x + "</div>").join(""))

	for (let i of ["All", ...Object.keys(categories)]) {
		d.element("navigation_" + i).style.opacity = "0.6"
	}
	d.element("navigation_" + name).style.opacity = "1"
}

function generateHTML() {
	document.getElementById("navigation").innerHTML = ["All", ...Object.keys(categories)]
		.map(x => "<button id=\"navigation_" + x + "\" class=\"navigation\" style=\"width:calc(" + (100 / (Object.keys(categories).length + 1)) + "vw - 3px);\" onClick=\"switchTab('" + x + "');\">" + x + "</button>")
		.join("")
	switchTab("All")
}

generateHTML()
